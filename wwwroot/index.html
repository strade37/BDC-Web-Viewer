<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="https://cdn.autodesk.io/favicon.ico">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css">
    <link rel="stylesheet" href="/main.css">
    <title>Binkei Digital Construction Viewer</title>
</head>

<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <img 
                class="logo" 
                src="/assets/images/logo-bdc.png" 
                alt="Binkei Digital Construction">
            <span class="title">Binkei Digital Construction</span>
        </div>
        
        <div class="header-center">
            <input
                class="input"
                id="search"
                type="text"
                placeholder="Search Project">
        </div>
        
        <div class="header-right">
            <select
                class="dropdown"
                name="models"
                id="models">
            </select>

            <button 
                id="upload" 
                class="btn btn-primary" 
                title="Upload New Model">
                Upload
            </button>

            <input class="hidden" type="file" id="input">

            <button
                id="setting"
                class="icon-button"
                title="Settings">
                <img src="/assets/icons/settings.svg" alt="Settings">
            </button>

            <button
                id="user"
                class="icon-button"
                title="User">
                <img src="/assets/icons/user.svg" alt="User">
            </button>
        </div>

    </header>

    <!-- Main -->
    <main id="main-layout">
        <!-- Sidebar -->
        <aside id="sidebar">

            <div class="menu-item active">
                <img src="/assets/icons/dashboard.svg" alt="Dashboard">
                <span>Dashboard</span>
            </div>

            <div class="menu-item">
                <img src="/assets/icons/model.svg" alt="Models">
                <span>Models</span>
            </div>

            <div class="menu-item">
                <img src="/assets/icons/document.svg" alt="Documents">
                <span>Documents</span>
            </div>

            <div class="menu-item">
                <img src="/assets/icons/issues.svg" alt="Issues">
                <span>Issues</span>
            </div>

            <div class="menu-item">
                <img src="/assets/icons/clash.svg" alt="Clash">
                <span>Clash</span>
            </div>

            <div class="menu-item">
                <img src="/assets/icons/settings.svg" alt="Settings">
                <span>Settings</span>
            </div>

        </aside>

        <!-- Viewer -->
        <section id="viewer-container">

            <!-- Viewer Area -->
            <div id="viewer-area">
                <!-- APS Viewer -->
                <div id="preview"></div>

                <!-- Notification Overlay -->
                <div id="overlay"></div>
            </div>

            <!-- Right Panel -->
             <aside id="right-panel">

                <div class="panel-header">
                    <h3>Properties</h3>
                </div>

                <div class="panel-content">

                    <div class="empty-state">
                        Select an object<br>
                        to view its properties
                    </div>

                </div>

            </aside>

        </section>
    </main>

    <!-- Footer -->
    <footer id="footer">

    </footer>

    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
    <script src="/main.js" type="module"></script>

</body>

</html>
