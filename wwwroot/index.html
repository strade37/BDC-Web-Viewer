<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="icon" type="image/x-icon" href="https://cdn.autodesk.io/favicon.ico">
    <link rel="stylesheet" href="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/style.css">
    <link rel="stylesheet" href="/main.css">
    <title>Binkei Digital Construction Viewer</title>
</head>

<body>
    <!-- Header -->
    <header id="header">
        <div class="header-left">
            <img class="logo" 
            src="/assets/images/logo-bdc.png" 
            alt="Binkei Digital Construction">
            <span class="title">Binkei Digital Construction</span>
        </div>
        
        <div class="header-center">
        <input
            id="search"
            type="text"
            placeholder="Search Project">
        </div>
        
        <div class="header-right">
            <select name="models" id="models"></select>
            <button id="upload" title="Upload New Model">Upload</button>
            <input style="display: none" type="file" id="input">
            <button id="setting">⚙</button>
            <button id="user">👤</button>
        </div>

    </header>

    <!-- Main -->
    <main id="main-layout">
        <!-- Sidebar -->
        <aside id="sidebar">

                <div class="menu-item active">
                    <img src="/assets/icons/dashboard.svg">
                    <span>Dashboard</span>
                </div>

                <div class="menu-item">
                    <img src="/assets/icons/model.svg">
                    <span>Models</span>
                </div>

                <div class="menu-item">
                    <img src="/assets/icons/document.svg">
                    <span>Documents</span>
                </div>

                <div class="menu-item">
                    <img src="/assets/icons/issues.svg">
                    <span>Issues</span>
                </div>

                <div class="menu-item">
                    <img src="/assets/icons/clash.svg">
                    <span>Clash</span>
                </div>

                <div class="menu-item">
                    <img src="/assets/icons/settings.svg">
                    <span>Settings</span>
                </div>

        </aside>

        <!-- Viewer -->
        <section id="viewer-container">
            <!-- APS Viewer -->
            <div id="preview"></div>
            <!-- Notification Overlay -->
            <div id="overlay"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer id="footer">

    </footer>

    <script src="https://developer.api.autodesk.com/modelderivative/v2/viewers/7.*/viewer3D.js"></script>
    <script src="/main.js" type="module"></script>

</body>

</html>
